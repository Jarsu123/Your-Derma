<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Add Log — YourDerma</title>
</head>
<body class="bg-white text-slate-900">
  <header class="max-w-6xl mx-auto px-6 py-5 flex items-center justify-between">
    <a href="/dashboard" class="font-semibold tracking-tight text-lg">YourDerma</a>
    <nav class="flex items-center gap-4 text-sm">
      <a href="/dashboard" class="hover:text-slate-900 text-slate-700">Dashboard</a>
      <a href="/progress" class="hover:text-slate-900 text-slate-700">Progress</a>
    </nav>
  </header>

  <main class="max-w-3xl mx-auto px-6 py-10">
    <h1 class="text-2xl font-semibold tracking-tight">Add today’s log</h1>
    <p class="text-slate-600 mt-1">Simple scoring makes progress measurable.</p>

    <form class="mt-8 space-y-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="text-sm text-slate-700">Acne count</label>
          <input type="number" class="mt-1 w-full px-4 py-3 rounded-xl border border-slate-200" placeholder="e.g., 3" />
        </div>
        <div>
          <label class="text-sm text-slate-700">Hairfall score (0–5)</label>
          <input type="number" class="mt-1 w-full px-4 py-3 rounded-xl border border-slate-200" placeholder="e.g., 2" />
        </div>
      </div>

      <div>
        <label class="text-sm text-slate-700">Dryness / irritation (0–5)</label>
        <input type="number" class="mt-1 w-full px-4 py-3 rounded-xl border border-slate-200" placeholder="e.g., 1" />
      </div>

      <div>
        <label class="text-sm text-slate-700">Notes</label>
        <textarea class="mt-1 w-full px-4 py-3 rounded-xl border border-slate-200" rows="4"
                  placeholder="e.g., used adapalene, less oily, slept late..."></textarea>
      </div>

      <div class="flex gap-3">
        <a href="/dashboard" class="px-4 py-2 rounded-xl bg-slate-900 text-white hover:bg-slate-800">Save (mock)</a>
        <a href="/dashboard" class="px-4 py-2 rounded-xl border border-slate-200 hover:bg-slate-50">Cancel</a>
      </div>
    </form>
  </main>
</body>
</html>
