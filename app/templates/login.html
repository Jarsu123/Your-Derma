<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Login • YourDerma</title>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center px-4">

  <div class="w-full max-w-md bg-white border border-slate-200 rounded-3xl shadow-xl p-8">
    <a href="/" class="text-sm text-slate-600 hover:text-slate-900">← Back</a>

    <h1 class="mt-3 text-2xl font-semibold">Login</h1>
    <p class="mt-1 text-slate-600 text-sm">Welcome back.</p>

    {% if err == "invalid" %}
      <div class="mt-4 rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
        Invalid email or password.
      </div>
    {% endif %}

    <form class="mt-6 space-y-4" action="/login" method="POST">
      <div>
        <label class="text-sm text-slate-700">Email</label>
        <input name="email" type="email" required
          class="mt-1 w-full px-4 py-3 rounded-2xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-slate-900/10"
          placeholder="you@example.com" />
      </div>

      <div>
        <label class="text-sm text-slate-700">Password</label>
        <input name="password" type="password" required
          class="mt-1 w-full px-4 py-3 rounded-2xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-slate-900/10"
          placeholder="••••••••" />
      </div>

      <button class="w-full rounded-2xl bg-slate-900 text-white py-3 font-medium hover:bg-slate-800">
        Login →
      </button>
    </form>

    <p class="mt-4 text-sm text-slate-600">
      Don’t have an account? <a class="font-medium text-slate-900 hover:underline" href="/signup">Sign up</a>
    </p>
  </div>

</body>
</html>
