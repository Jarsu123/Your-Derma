<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Progress — YourDerma</title>
</head>
<body class="bg-white text-slate-900">
  <header class="max-w-6xl mx-auto px-6 py-5 flex items-center justify-between">
    <a href="/dashboard" class="font-semibold tracking-tight text-lg">YourDerma</a>
    <nav class="flex items-center gap-4 text-sm">
      <a href="/dashboard" class="hover:text-slate-900 text-slate-700">Dashboard</a>
      <a href="/log" class="hover:text-slate-900 text-slate-700">Add Log</a>
    </nav>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-10">
    <h1 class="text-2xl font-semibold tracking-tight">Progress</h1>
    <p class="text-slate-600 mt-1">Graphs will appear here once we connect database.</p>

    <div class="mt-8 grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="p-6 rounded-2xl border border-slate-200">
        <div class="font-medium">Acne trend</div>
        <div class="mt-3 h-40 rounded-xl bg-slate-50 border border-dashed border-slate-200 flex items-center justify-center text-sm text-slate-500">
          Chart placeholder
        </div>
      </div>
      <div class="p-6 rounded-2xl border border-slate-200">
        <div class="font-medium">Hairfall trend</div>
        <div class="mt-3 h-40 rounded-xl bg-slate-50 border border-dashed border-slate-200 flex items-center justify-center text-sm text-slate-500">
          Chart placeholder
        </div>
      </div>
    </div>
  </main>
</body>
</html>
