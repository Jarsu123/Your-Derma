<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Prescription • YourDerma</title>
</head>
<body class="min-h-screen bg-slate-50 px-6 py-10">

  <div class="max-w-5xl mx-auto">
    <div class="bg-white border border-slate-200 rounded-3xl shadow-xl p-8">

      <!-- Header -->
      <div class="flex items-center justify-between">
        <h1 class="text-2xl font-semibold">Your Prescription</h1>
        <a href="/upload" class="text-sm px-4 py-2 rounded-xl border border-slate-200 hover:bg-slate-50">
          New Upload
        </a>
      </div>

      <!-- Main Grid -->
      <div class="mt-6 grid grid-cols-1 md:grid-cols-2 gap-6">

        <!-- Image -->
        <div class="rounded-3xl overflow-hidden border border-slate-200 bg-slate-100">
          <img src="{{ image_url }}" class="w-full h-full object-cover" alt="Uploaded image"/>
        </div>

        <!-- Routine -->
        <div class="rounded-3xl border border-slate-200 p-6">
          <h2 class="text-lg font-semibold mb-4">Routine</h2>

          <!-- ✅ FIXED LOOP -->
          <div class="space-y-3">
            {% for item in prescription %}
              <div class="p-4 rounded-2xl border shadow-sm hover:shadow-md transition">

                <div class="flex justify-between items-center">
                  <h3 class="font-semibold text-slate-800">
                    {{ item.step }}
                  </h3>

                  <span class="text-xs bg-slate-200 px-2 py-1 rounded">
                    {{ item.when }}
                  </span>
                </div>

                <p class="text-sm mt-1 text-slate-600">
                  {{ item.product_type }}
                </p>

                <p class="text-xs mt-2 text-slate-500">
                  {{ item.notes }}
                </p>

              </div>
            {% endfor %}
          </div>

          <!-- Note -->
          <div class="mt-6 rounded-2xl bg-amber-50 border border-amber-200 p-4 text-sm text-amber-900">
            Note: This is a demo prescription. For medical diagnosis, consult a dermatologist.
          </div>
        </div>

      </div>

      <!-- Back -->
      <div class="mt-6">
        <a href="/dashboard" class="text-sm text-slate-600 hover:text-slate-900">
          ← Back to Dashboard
        </a>
      </div>

    </div>
  </div>

</body>
</html>
