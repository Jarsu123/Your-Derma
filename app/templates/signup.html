<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Sign up — YourDerma</title>
  <style>
    body{
      background:
        radial-gradient(900px 520px at 12% 8%, rgba(47,133,90,.10), transparent 60%),
        radial-gradient(900px 520px at 88% 22%, rgba(161,98,7,.08), transparent 62%),
        radial-gradient(900px 520px at 45% 92%, rgba(148,163,184,.10), transparent 60%),
        #ffffff;
    }
  </style>
</head>

<body class="text-slate-900">
  <main class="min-h-screen flex items-center justify-center px-6 py-12">
    <div class="w-full max-w-md">
      <a href="/" class="inline-flex items-center gap-2 text-sm text-slate-600 hover:text-slate-900">
        ← Back
      </a>

      <div class="mt-4 rounded-3xl border border-slate-200 bg-white/70 backdrop-blur p-7 shadow-xl">
        <h1 class="text-2xl font-semibold tracking-tight">Create your account</h1>
        <p class="mt-1 text-sm text-slate-600">Start tracking in less than a minute.</p>

        <form class="mt-6 space-y-4" action="/signup" method="POST">
          <div>
            <label class="text-sm text-slate-700">Name</label>
            <input name="name" required
              class="mt-1 w-full px-4 py-3 rounded-2xl border border-slate-200 bg-white/80 focus:outline-none focus:ring-2 focus:ring-emerald-300"
              placeholder="Suraj" />
          </div>

          <div>
            <label class="text-sm text-slate-700">Email</label>
            <input name="email" type="email" required
              class="mt-1 w-full px-4 py-3 rounded-2xl border border-slate-200 bg-white/80 focus:outline-none focus:ring-2 focus:ring-emerald-300"
              placeholder="you@example.com" />
          </div>

          <div>
            <label class="text-sm text-slate-700">Password</label>
            <input name="password" type="password" maxlength="72 required .../>     
              class="mt-1 w-full px-4 py-3 rounded-2xl border border-slate-200 bg-white/80 focus:outline-none focus:ring-2 focus:ring-emerald-300"
              placeholder="••••••••" />
          </div>

          <button class="w-full px-4 py-3 rounded-2xl bg-slate-900 text-white hover:bg-slate-800 shadow-lg shadow-slate-900/10">
            Create account →
          </button>
        </form>

        <p class="mt-4 text-sm text-slate-600">
          Already have an account?
          <a href="/login" class="text-slate-900 font-medium hover:underline">Login</a>
        </p>
      </div>
    </div>
  </main>
</body>
</html>
